name: Build

on:
  push:
    paths-ignore:
      - .editorconfig
      - .gitattributes
      - .github/**
      - .gitignore
      - CHANGELOG.md
      - LICENSE
      - README.md
  workflow_dispatch:
    inputs:
      dalamud_branch:
        description: 'Dalamud Branch'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - stg

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      DALAMUD_HOME: ${{ github.workspace }}/.dalamud
      is_release: ${{ startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Download Dalamud
        env:
          DALAMUD_URL: |-
            ${{ case(
              github.event.inputs.dalamud_branch == 'stg' || github.event.ref == 'refs/heads/stg' || startsWith(github.event.head_commit.message, '[stg]'), 'https://goatcorp.github.io/dalamud-distrib/stg/latest.zip',
              'https://goatcorp.github.io/dalamud-distrib/latest.zip'
            ) }}
        run: |
          mkdir -p "${{ env.DALAMUD_HOME }}"
          curl -fsSL "${{ env.DALAMUD_URL }}" -o dalamud.zip
          unzip -q -o dalamud.zip -d "${{ env.DALAMUD_HOME }}"
          rm dalamud.zip

      - name: Pack
        run: dotnet pack ImAnimSharp/ImAnimSharp.csproj -o dist

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*
